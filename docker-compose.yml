services:
  db:
    image: postgres:16-alpine
    container_name: oak-db
    environment:
      POSTGRES_USER: oak
      POSTGRES_PASSWORD: oak
      POSTGRES_DB: oak
    ports:
      - "5432:5432"
    volumes:
      - oak_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oak"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    container_name: oak-backend
    env_file:
      - ./backend/.env
    environment:
      # Overrides the value in backend/.env — inside the compose network,
      # Postgres is reachable at the service name "db", not localhost.
      DATABASE_URL: postgresql://oak:oak@db:5432/oak?schema=public
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  oak_pgdata:
