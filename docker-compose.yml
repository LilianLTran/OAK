version: "3.9"
services:
  db:
    image: postgres:16-alpine
    container_name: oak-db
    environment:
      POSTGRES_USER: oak
      POSTGRES_PASSWORD: oak
      POSTGRES_DB: oak
    ports:
      - "5432:5432"
    volumes:
      - oak_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oak"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  oak_pgdata:
